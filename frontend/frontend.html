<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 200px); }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0; }
            40% { opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <div class="max-w-4xl mx-auto p-4">
        <!-- Header -->
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-white">Health Information Assistant</h1>
            <p class="text-gray-400 text-sm mt-1">AI-powered health triage with MCP tool execution</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Chat Panel -->
            <div class="lg:col-span-2 bg-gray-800 rounded-xl shadow-lg overflow-hidden">
                <!-- Messages -->
                <div id="chat-messages" class="chat-container overflow-y-auto p-4 space-y-4">
                    <div class="text-center text-gray-500 py-8">
                        <p>Describe your health concern to get started.</p>
                        <p class="text-xs mt-2">Example: "I have a headache"</p>
                    </div>
                </div>

                <!-- Input -->
                <div class="border-t border-gray-700 p-4">
                    <div class="flex gap-2">
                        <input
                            type="text"
                            id="user-input"
                            placeholder="Describe your symptoms..."
                            class="flex-1 bg-gray-700 text-white rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                            onkeypress="if(event.key === 'Enter') sendMessage()"
                        >
                        <button
                            onclick="sendMessage()"
                            id="send-btn"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition-colors"
                        >
                            Send
                        </button>
                    </div>
                    <button
                        onclick="resetChat()"
                        class="mt-2 text-gray-500 hover:text-gray-300 text-sm"
                    >
                        Reset conversation
                    </button>
                </div>
            </div>

            <!-- Side Panel: MCP Actions & Intake -->
            <div class="space-y-4">
                <!-- Intake Summary -->
                <div class="bg-gray-800 rounded-xl p-4">
                    <h2 class="font-semibold text-gray-300 mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                        Intake Data
                    </h2>
                    <div id="intake-data" class="text-sm space-y-1 text-gray-400">
                        <p class="italic">No data collected yet</p>
                    </div>
                </div>

                <!-- MCP Actions -->
                <div class="bg-gray-800 rounded-xl p-4">
                    <h2 class="font-semibold text-gray-300 mb-3 flex items-center gap-2">
                        <span class="w-2 h-2 bg-green-500 rounded-full"></span>
                        MCP Tool Executions
                    </h2>
                    <div id="mcp-results" class="text-sm space-y-2">
                        <p class="text-gray-500 italic">Tools execute after triage</p>
                    </div>
                </div>

                <!-- Status -->
                <div class="bg-gray-800 rounded-xl p-4">
                    <h2 class="font-semibold text-gray-300 mb-3 flex items-center gap-2">
                        <span id="status-dot" class="w-2 h-2 bg-gray-500 rounded-full"></span>
                        Status
                    </h2>
                    <p id="status-text" class="text-sm text-gray-400">Ready</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';

        // Conversation state
        let state = {
            user_message: '',
            intake: {},
            context: '',
            follow_up_question: null,
            follow_up_answer: null
        };
        let originalMessage = '';
        let isWaitingForFollowUp = false;

        function setStatus(text, color = 'gray') {
            document.getElementById('status-text').textContent = text;
            const dot = document.getElementById('status-dot');
            dot.className = `w-2 h-2 rounded-full bg-${color}-500`;
        }

        function addMessage(content, isUser = false, isUrgent = false) {
            const container = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            wrapper.className = `flex ${isUser ? 'justify-end' : 'justify-start'}`;

            const bubble = document.createElement('div');
            let bgColor = isUser ? 'bg-blue-600' : 'bg-gray-700';
            if (isUrgent) bgColor = 'bg-red-600';

            bubble.className = `${bgColor} rounded-2xl px-4 py-3 max-w-[85%] ${isUser ? 'rounded-br-md' : 'rounded-bl-md'}`;
            bubble.innerHTML = `<p class="text-sm whitespace-pre-wrap">${content}</p>`;

            wrapper.appendChild(bubble);
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function addTypingIndicator() {
            const container = document.getElementById('chat-messages');
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            wrapper.className = 'flex justify-start';
            wrapper.innerHTML = `
                <div class="bg-gray-700 rounded-2xl px-4 py-3 rounded-bl-md">
                    <div class="typing-indicator flex gap-1">
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                        <span class="w-2 h-2 bg-gray-400 rounded-full"></span>
                    </div>
                </div>
            `;
            container.appendChild(wrapper);
            container.scrollTop = container.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function updateIntakeDisplay(intake) {
            const container = document.getElementById('intake-data');
            const filtered = Object.entries(intake).filter(([k]) => !k.startsWith('_'));

            if (filtered.length === 0) {
                container.innerHTML = '<p class="italic text-gray-500">No data collected yet</p>';
                return;
            }

            const labels = {
                onset_time: 'Onset',
                sudden: 'Type',
                severity: 'Severity',
                fever: 'Fever',
                neuro: 'Neuro Symptoms',
                injury: 'Head Injury'
            };

            container.innerHTML = filtered.map(([key, value]) => `
                <div class="flex justify-between py-1 border-b border-gray-700">
                    <span class="text-gray-400">${labels[key] || key}</span>
                    <span class="text-white font-medium">${value}</span>
                </div>
            `).join('');
        }

        function updateMCPDisplay(mcpResults, isUrgent) {
            const container = document.getElementById('mcp-results');
            if (!mcpResults) return;

            let html = '';

            // Log result
            if (mcpResults.log) {
                const log = mcpResults.log;
                html += `
                    <div class="bg-gray-700/50 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-green-400">✓</span>
                            <span class="font-medium text-gray-200">log_triage_result</span>
                        </div>
                        <p class="text-gray-400 text-xs">ID: ${log.log_id || 'N/A'}</p>
                        <p class="text-gray-400 text-xs">${log.message || ''}</p>
                    </div>
                `;
            }

            // Urgent alert
            if (mcpResults.alert) {
                const alert = mcpResults.alert;
                html += `
                    <div class="bg-red-900/30 border border-red-700 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-red-400">⚠</span>
                            <span class="font-medium text-red-300">send_urgent_alert</span>
                        </div>
                        <p class="text-red-400 text-xs">ID: ${alert.alert_id || 'N/A'}</p>
                        <p class="text-red-400 text-xs">${alert.message || ''}</p>
                    </div>
                `;
            }

            // Follow-up scheduled
            if (mcpResults.followup) {
                const followup = mcpResults.followup;
                html += `
                    <div class="bg-blue-900/30 border border-blue-700 rounded-lg p-3">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-blue-400">📅</span>
                            <span class="font-medium text-blue-300">schedule_followup</span>
                        </div>
                        <p class="text-blue-400 text-xs">ID: ${followup.appointment_id || 'N/A'}</p>
                        <p class="text-blue-400 text-xs">${followup.message || ''}</p>
                    </div>
                `;
            }

            container.innerHTML = html || '<p class="text-gray-500 italic">No tools executed</p>';
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const message = input.value.trim();
            if (!message) return;

            // Disable input while processing
            input.disabled = true;
            document.getElementById('send-btn').disabled = true;

            // Add user message to chat
            addMessage(message, true);
            input.value = '';

            // Update state based on conversation phase
            if (isWaitingForFollowUp) {
                // This is an answer to a follow-up question
                state.follow_up_answer = message;
                setStatus('Processing answer...', 'yellow');
            } else {
                // This is the initial message
                originalMessage = message;
                state.user_message = message;
                state.intake = {};
                state.context = '';
                setStatus('Analyzing...', 'yellow');
            }

            addTypingIndicator();

            try {
                const response = await fetch(`${API_URL}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state)
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const result = await response.json();
                console.log('API Response:', result);

                // Update intake display
                if (result.intake) {
                    updateIntakeDisplay(result.intake);
                }

                // Check if we have a follow-up question
                if (result.follow_up_question && !result.final) {
                    addMessage(result.follow_up_question);

                    // Update state for next round
                    state = {
                        user_message: originalMessage,
                        intake: result.intake || {},
                        context: result.context || '',
                        follow_up_question: result.follow_up_question,
                        follow_up_answer: null
                    };
                    isWaitingForFollowUp = true;
                    setStatus('Waiting for answer...', 'blue');
                }

                // Check if we have a final response
                if (result.final) {
                    addMessage(result.final, false, result.urgent);

                    // Show MCP results
                    if (result.mcp_results) {
                        updateMCPDisplay(result.mcp_results, result.urgent);
                    }

                    // Reset state
                    isWaitingForFollowUp = false;
                    state = {
                        user_message: '',
                        intake: {},
                        context: '',
                        follow_up_question: null,
                        follow_up_answer: null
                    };

                    setStatus(result.urgent ? 'URGENT - Seek care' : 'Complete', result.urgent ? 'red' : 'green');
                }

            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage(`Error: ${error.message}. Make sure the API is running (python api.py)`);
                setStatus('Error', 'red');
            }

            // Re-enable input
            input.disabled = false;
            document.getElementById('send-btn').disabled = false;
            input.focus();
        }

        function resetChat() {
            // Reset state
            state = {
                user_message: '',
                intake: {},
                context: '',
                follow_up_question: null,
                follow_up_answer: null
            };
            originalMessage = '';
            isWaitingForFollowUp = false;

            // Clear UI
            document.getElementById('chat-messages').innerHTML = `
                <div class="text-center text-gray-500 py-8">
                    <p>Describe your health concern to get started.</p>
                    <p class="text-xs mt-2">Example: "I have a headache"</p>
                </div>
            `;
            document.getElementById('intake-data').innerHTML = '<p class="italic text-gray-500">No data collected yet</p>';
            document.getElementById('mcp-results').innerHTML = '<p class="text-gray-500 italic">Tools execute after triage</p>';
            setStatus('Ready', 'gray');
        }

        // Focus input on load
        document.getElementById('user-input').focus();
    </script>
</body>
</html>
